name: Test on macOS

on:
  workflow_dispatch:
  workflow_call:

jobs:
  macos:
    name: Test macOS
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v3
        with:
          path: cle
      - name: Resolve binaries branch
        id: binaries-ref
        shell: bash
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          if [ -n "$BRANCH" ] && git ls-remote --exit-code --heads https://github.com/angr/binaries.git "$BRANCH" >/dev/null 2>&1; then
            echo "ref=$BRANCH" >> "$GITHUB_OUTPUT"
          else
            echo "ref=master" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v3
        with:
          repository: angr/binaries
          path: binaries
          ref: ${{ steps.binaries-ref.outputs.ref }}
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - run: python -m venv $HOME/venv
        name: Create venv
        shell: bash
      - run: |
          source $HOME/venv/bin/activate
          pip install git+https://github.com/angr/archinfo.git
          pip install git+https://github.com/angr/pyvex.git
        name: Install dependencies
      - run: |
          source $HOME/venv/bin/activate
          pip install ./cle[testing]
        name: Install
      - run: |
          source $HOME/venv/bin/activate
          pytest -n auto cle
        name: Run pytest
