name: Test on Windows

on:
  workflow_dispatch:
  workflow_call:

jobs:
  windows:
    name: Test Windows
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v3
        with:
          path: cle
      - name: Resolve binaries branch
        id: binaries-ref
        shell: bash
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          if [ -n "$BRANCH" ] && git ls-remote --exit-code --heads https://github.com/angr/binaries.git "$BRANCH" >/dev/null 2>&1; then
            echo "ref=$BRANCH" >> "$GITHUB_OUTPUT"
          else
            echo "ref=master" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v3
        with:
          repository: angr/binaries
          path: binaries
          ref: ${{ steps.binaries-ref.outputs.ref }}
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - run: python -m venv $HOME/venv
        name: Create venv
        shell: bash
      - run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          call %USERPROFILE%\venv\Scripts\activate
          pip install git+https://github.com/angr/archinfo.git
          pip install git+https://github.com/angr/pyvex.git
        name: Install dependencies
        shell: cmd
      - run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          call %USERPROFILE%\venv\Scripts\activate
          pip install ./cle[testing]
        name: Install
        shell: cmd
      - run: |
          call %USERPROFILE%\venv\Scripts\activate
          pytest -n auto cle
        name: Run pytest
        shell: cmd
